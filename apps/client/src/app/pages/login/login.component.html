
    <div class="container">
        <form (submit)="submitRequest()">
            <label for="username">Username or Email:</label>
            <input type="text" id="username" [(ngModel)]="this.req().userNameOrEmail" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" [(ngModel)]="this.req().password" name="password" required>

            <button type="submit">Login</button>
        </form>
    </div>
