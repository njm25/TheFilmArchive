@for(user of users(); track user.id) {
	<div class="border border-black m-1 p-1 text-center source-card text-muted">
		<small>
			{{ user.userName }} ({{ user.email }})
		</small>

		<div class="mt-2">
			<select (change)="onRoleChange(user.id, $event)">
				@for(role of roles; track role.value) {
					<option
						[value]="role.value"
						[selected]="user.role === role.value">
						{{ role.label }}
					</option>
				}
			</select>
		</div>
	</div>
} @empty {
	<p>No users found.</p>
}
