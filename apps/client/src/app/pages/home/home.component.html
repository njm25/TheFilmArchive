
<div class="d-flex">
    @for(film of films(); track film.filmId)
    {
        <div class="m-1">
            <tfa-film-card [film]="film"></tfa-film-card>
        </div>
    }
    @empty {
        <div class="spinner-border" role="status">
            <span class="sr-only"></span>
        </div>
    }
</div>
