<tfa-link [href]="filmSrc()" class="film-card" styleClass="d-flex flex-column h-100">
  @if (film()?.posterPath) {
    <img class="poster" [src]="posterSrc()" alt="{{ film()?.title }}" />
  }
  <div class="film-info">
    <span class="film-title">{{ film()?.title }}</span>
    <span class="film-year">{{ film()?.yearReleased }}</span>
  </div>
</tfa-link>
